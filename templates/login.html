<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HealthMate — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#060b14;--bg2:#0d1525;--bg3:#111d33;--surface:#141f35;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#e8edf5;--text2:#8a9ab8;--text3:#4a5a78;
  --accent:#00d4c8;--accent2:#0099ff;--danger:#ff4d6d;
  --font:'DM Sans',sans-serif;--display:'Syne',sans-serif;--r:10px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.wrap{width:100%;max-width:400px;}
.logo-area{text-align:center;margin-bottom:32px;}
.logo-icon{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:inline-flex;align-items:center;justify-content:center;margin-bottom:14px;box-shadow:0 8px 24px rgba(0,212,200,0.3);}
.logo-icon svg{width:28px;height:28px;}
.logo-title{font-family:var(--display);font-size:28px;font-weight:700;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.logo-sub{font-size:14px;color:var(--text3);margin-top:4px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;box-shadow:0 20px 60px rgba(0,0,0,0.5);}
.form-group{margin-bottom:16px;}
label{display:block;font-size:11px;font-weight:600;color:var(--text3);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.06em;}
input{width:100%;padding:11px 14px;border:1px solid var(--border2);border-radius:var(--r);background:var(--bg3);color:var(--text);font-size:14px;font-family:var(--font);transition:all 0.15s;}
input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,212,200,0.12);}
.btn{width:100%;padding:12px;background:linear-gradient(135deg,var(--accent),#00b8ad);color:#001a1a;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);transition:all 0.15s;margin-top:8px;box-shadow:0 4px 16px rgba(0,212,200,0.3);}
.btn:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,212,200,0.45);}
.error{background:rgba(255,77,109,0.08);border:1px solid rgba(255,77,109,0.25);color:var(--danger);border-radius:var(--r);padding:10px 14px;font-size:13px;margin-bottom:16px;}
.footer{text-align:center;margin-top:20px;font-size:12px;color:var(--text3);}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-area">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="var(--bg)" stroke-width="2.5"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
    </div>
    <div class="logo-title">HealthMate</div>
    <div class="logo-sub">Your personal AI health companion</div>
  </div>
  <div class="card">
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
    <form method="POST" action="/login">
      <div class="form-group"><label>Username</label><input type="text" name="username" placeholder="Enter your username" autocomplete="username" required autofocus></div>
      <div class="form-group"><label>Password</label><input type="password" name="password" placeholder="Enter your password" autocomplete="current-password" required></div>
      <button type="submit" class="btn">Sign In →</button>
    </form>
    <div style="text-align:center;margin-top:18px;font-size:14px;color:var(--text3)">
      New to HealthMate? <a href="/register" style="color:var(--accent);text-decoration:none;font-weight:500">Create account</a>
    </div>
  </div>
  <div class="footer">Private & secure · All health data encrypted</div>
</div>
</body>
</html>
