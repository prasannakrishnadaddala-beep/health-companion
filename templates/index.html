<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>HealthMate — Personal Health Companion</title>

<!-- PWA Manifest -->
<link rel="manifest" href="/static/manifest.json">

<!-- Theme & status bar -->
<meta name="theme-color" content="#00d4c8">
<meta name="msapplication-TileColor" content="#060b14">
<meta name="msapplication-TileImage" content="/static/icons/icon-144x144.png">

<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="HealthMate">
<link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
<link rel="apple-touch-icon" sizes="152x152" href="/static/icons/icon-152x152.png">
<link rel="apple-touch-icon" sizes="192x192" href="/static/icons/icon-192x192.png">

<!-- Favicon -->
<link rel="icon" type="image/png" sizes="192x192" href="/static/icons/icon-192x192.png">
<link rel="shortcut icon" href="/static/favicon.ico">

<!-- SEO / share -->
<meta name="description" content="Your personal AI health companion — track vitals, medications, diet and appointments.">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="HealthMate">

<!-- Safe-area insets for iPhone notch/Dynamic Island -->
<style>
  body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
  .sidebar { padding-top: max(16px, env(safe-area-inset-top)); }
</style>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&family=Syne:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
:root {
  --bg: #060b14;
  --bg2: #0d1525;
  --bg3: #111d33;
  --surface: #141f35;
  --surface2: #1a2840;
  --surface3: #1f3050;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --border3: rgba(255,255,255,0.18);
  --text: #e8edf5;
  --text2: #8a9ab8;
  --text3: #4a5a78;
  --accent: #00d4c8;
  --accent2: #0099ff;
  --accent3: #7c6fff;
  --danger: #ff4d6d;
  --warning: #ffb347;
  --success: #00e5a0;
  --pink: #ff6eb4;
  --font: 'DM Sans', sans-serif;
  --mono: 'DM Mono', monospace;
  --display: 'Syne', sans-serif;
  --r: 10px;
  --r2: 14px;
  --r3: 18px;
  --glow: 0 0 20px rgba(0,212,200,0.15);
  --glow2: 0 0 30px rgba(0,153,255,0.2);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
@keyframes slideIn { from { transform: translateX(60px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
html { scroll-behavior: smooth; }
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

/* Scrollbar */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 2px; }

/* Layout */
.shell { display: flex; min-height: 100vh; }
.sidebar {
  width: 230px; background: var(--bg2); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; padding: 0; position: fixed;
  top: 0; left: 0; height: 100vh; z-index: 100;
}
.main { margin-left: 230px; flex: 1; padding: 28px 32px; min-height: 100vh; }

/* Sidebar header */
.sidebar-header {
  padding: 22px 20px 18px;
  border-bottom: 1px solid var(--border);
  background: linear-gradient(180deg, rgba(0,212,200,0.05) 0%, transparent 100%);
}
.logo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
.logo-icon {
  width: 36px; height: 36px; border-radius: 10px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 4px 12px rgba(0,212,200,0.3);
}
.logo-icon svg { width: 18px; height: 18px; }
.logo-title { font-family: var(--display); font-size: 17px; font-weight: 700; color: var(--text); }
.logo-sub { font-size: 11px; color: var(--text3); margin-left: 46px; }

/* Nav */
.nav-section { padding: 14px 12px 6px; }
.nav-label { font-size: 10px; font-weight: 600; color: var(--text3); letter-spacing: 0.1em; text-transform: uppercase; padding: 0 8px; margin-bottom: 4px; }
.nav-item {
  display: flex; align-items: center; gap: 10px; padding: 9px 10px;
  border-radius: var(--r); cursor: pointer; font-size: 13px; color: var(--text2);
  transition: all 0.2s; margin-bottom: 2px; position: relative;
}
.nav-item:hover { background: var(--surface); color: var(--text); }
.nav-item.active { background: rgba(0,212,200,0.1); color: var(--accent); }
.nav-item.active::before {
  content: ''; position: absolute; left: 0; top: 20%; bottom: 20%;
  width: 3px; border-radius: 0 2px 2px 0; background: var(--accent);
}
.nav-icon { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; background: rgba(255,255,255,0.04); }
.nav-item.active .nav-icon { background: rgba(0,212,200,0.15); }
.nav-badge { margin-left: auto; background: var(--danger); color: white; font-size: 10px; padding: 1px 6px; border-radius: 10px; font-weight: 600; min-width: 18px; text-align: center; }
.nav-badge.hidden { display: none; }

/* Sidebar footer */
.sidebar-footer {
  margin-top: auto; padding: 14px 20px;
  border-top: 1px solid var(--border);
  font-size: 11px;
}
.status-dot { display: flex; align-items: center; gap: 6px; color: var(--text3); }
.dot-pulse { width: 6px; height: 6px; border-radius: 50%; background: var(--success); box-shadow: 0 0 6px var(--success); animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
@keyframes heartbeat { 0%,100%{transform:scale(1)} 15%{transform:scale(1.18)} 30%{transform:scale(1)} 45%{transform:scale(1.1)} 60%{transform:scale(1)} }
@keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
@keyframes countUp { from{opacity:0;transform:scale(0.8)} to{opacity:1;transform:scale(1)} }
.heartbeat-anim { animation: heartbeat 1.4s ease infinite; display:inline-block; }
.stat-card { animation: fadeIn 0.4s ease both; }
.stat-card:nth-child(1){animation-delay:0.05s}
.stat-card:nth-child(2){animation-delay:0.1s}
.stat-card:nth-child(3){animation-delay:0.15s}
.stat-card:nth-child(4){animation-delay:0.2s}
.stat-value { animation: countUp 0.5s ease both; }

/* Page header */
.page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
.page-title { font-family: var(--display); font-size: 24px; font-weight: 700; color: var(--text); line-height: 1.2; }
.page-sub { font-size: 13px; color: var(--text3); margin-top: 3px; }
.header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

/* Cards */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r2); padding: 18px 20px;
}
.card:hover { border-color: var(--border2); }
.card-title { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 16px; }

/* Stat cards */
.stat-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--r2); padding: 16px 18px; position: relative; overflow: hidden;
  transition: border-color 0.2s, transform 0.2s;
}
.stat-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
.stat-card.c-teal::before { background: linear-gradient(90deg, var(--accent), transparent); }
.stat-card.c-blue::before { background: linear-gradient(90deg, var(--accent2), transparent); }
.stat-card.c-red::before { background: linear-gradient(90deg, var(--danger), transparent); }
.stat-card.c-yellow::before { background: linear-gradient(90deg, var(--warning), transparent); }
.stat-card.c-green::before { background: linear-gradient(90deg, var(--success), transparent); }
.stat-card.c-purple::before { background: linear-gradient(90deg, var(--accent3), transparent); }
.stat-label { font-size: 11px; color: var(--text3); font-weight: 500; text-transform: uppercase; letter-spacing: 0.06em; }
.stat-value { font-family: var(--mono); font-size: 30px; font-weight: 500; margin: 6px 0 2px; line-height: 1; }
.stat-unit { font-size: 12px; color: var(--text3); }
.stat-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; padding: 3px 8px; border-radius: 20px; margin-top: 8px; font-weight: 500; }
.badge-ok { background: rgba(0,229,160,0.12); color: var(--success); border: 1px solid rgba(0,229,160,0.2); }
.badge-warn { background: rgba(255,179,71,0.12); color: var(--warning); border: 1px solid rgba(255,179,71,0.2); }
.badge-err { background: rgba(255,77,109,0.12); color: var(--danger); border: 1px solid rgba(255,77,109,0.2); }

/* Buttons */
.btn {
  padding: 8px 16px; border-radius: var(--r); border: 1px solid var(--border2);
  background: var(--surface2); color: var(--text); cursor: pointer;
  font-size: 13px; font-family: var(--font); font-weight: 500;
  transition: all 0.15s; white-space: nowrap; display: inline-flex; align-items: center; gap: 6px;
}
.btn:hover { background: var(--surface3); border-color: var(--border3); }
.btn-primary { background: linear-gradient(135deg, var(--accent), #00b8ad); color: #001a1a; border: none; font-weight: 600; box-shadow: 0 4px 12px rgba(0,212,200,0.25); }
.btn-primary:hover { box-shadow: 0 6px 20px rgba(0,212,200,0.4); transform: translateY(-1px); }
.btn-blue { background: linear-gradient(135deg, var(--accent2), #0077cc); color: white; border: none; box-shadow: 0 4px 12px rgba(0,153,255,0.25); }
.btn-blue:hover { box-shadow: 0 6px 20px rgba(0,153,255,0.4); transform: translateY(-1px); }
.btn-danger { background: rgba(255,77,109,0.1); color: var(--danger); border-color: rgba(255,77,109,0.3); }
.btn-danger:hover { background: rgba(255,77,109,0.2); }
.btn-sm { padding: 6px 12px; font-size: 12px; }
.btn-icon { padding: 6px 8px; background: transparent; border: none; cursor: pointer; color: var(--text3); font-size: 15px; border-radius: 6px; transition: all 0.15s; }
.btn-icon:hover { background: var(--surface2); color: var(--text); }
.btn-strava { background: linear-gradient(135deg, #fc4c02, #e83f00); color: white; border: none; box-shadow: 0 4px 12px rgba(252,76,2,0.3); }

/* Forms */
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 11px; font-weight: 600; color: var(--text3); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 9px 12px; border: 1px solid var(--border2);
  border-radius: var(--r); background: var(--bg3); color: var(--text);
  font-size: 13px; font-family: var(--font); transition: all 0.15s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,200,0.1);
}
.form-group select option { background: var(--surface); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

/* Grids */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }

/* Alert banners */
.alert { padding: 12px 16px; border-radius: var(--r); font-size: 13px; display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
.alert-warn { background: rgba(255,179,71,0.08); color: var(--warning); border: 1px solid rgba(255,179,71,0.2); }
.alert-info { background: rgba(0,153,255,0.08); color: #66bbff; border: 1px solid rgba(0,153,255,0.2); }
.alert-success { background: rgba(0,229,160,0.08); color: var(--success); border: 1px solid rgba(0,229,160,0.2); }
.alert-danger { background: rgba(255,77,109,0.08); color: var(--danger); border: 1px solid rgba(255,77,109,0.2); }

/* Chat */
.chat-container { display: flex; flex-direction: column; height: calc(100vh - 160px); max-height: 720px; }
.chat-messages {
  flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 14px;
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--r2) var(--r2) 0 0;
}
.msg { display: flex; gap: 10px; align-items: flex-start; max-width: 80%; animation: fadeUp 0.2s ease; }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg-avatar { width: 32px; height: 32px; border-radius: 10px; font-size: 12px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.msg-avatar.ai { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: var(--bg); font-family: var(--display); }
.msg-avatar.user { background: var(--surface3); color: var(--text2); }
.msg-bubble { padding: 11px 15px; border-radius: 14px; font-size: 14px; line-height: 1.6; }
.msg.ai .msg-bubble { background: var(--surface2); border: 1px solid var(--border); border-radius: 4px 14px 14px 14px; }
.msg.user .msg-bubble { background: linear-gradient(135deg, rgba(0,212,200,0.15), rgba(0,153,255,0.15)); border: 1px solid rgba(0,212,200,0.2); border-radius: 14px 4px 14px 14px; }
.msg-time { font-size: 10px; color: var(--text3); margin-top: 4px; }
.chat-footer { background: var(--surface); border: 1px solid var(--border); border-top: none; border-radius: 0 0 var(--r2) var(--r2); padding: 14px 16px; }
.quick-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.chip { padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border2); background: var(--bg3); font-size: 12px; cursor: pointer; color: var(--text2); transition: all 0.15s; }
.chip:hover { background: rgba(0,212,200,0.1); color: var(--accent); border-color: rgba(0,212,200,0.3); }
.chat-input-row { display: flex; gap: 10px; }
.chat-input { flex: 1; padding: 11px 16px; border: 1px solid var(--border2); border-radius: 24px; background: var(--bg3); color: var(--text); font-size: 14px; font-family: var(--font); transition: all 0.15s; }
.chat-input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,212,200,0.1); }
.send-btn { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); color: var(--bg); border: none; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: all 0.15s; box-shadow: 0 4px 12px rgba(0,212,200,0.3); }
.send-btn:hover { transform: scale(1.05); box-shadow: 0 6px 18px rgba(0,212,200,0.4); }

/* Chart */
.chart-wrap { position: relative; width: 100%; }

/* Records */
.record-item { display: flex; align-items: flex-start; gap: 14px; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r2); margin-bottom: 10px; transition: border-color 0.15s; }
.record-item:hover { border-color: var(--border2); }
.record-icon { width: 40px; height: 40px; border-radius: var(--r); background: rgba(0,153,255,0.1); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; border: 1px solid rgba(0,153,255,0.2); }
.record-name { font-size: 14px; font-weight: 500; color: var(--text); }
.record-date { font-size: 12px; color: var(--text3); margin-top: 2px; }
.record-analysis { font-size: 13px; color: var(--text2); margin-top: 8px; line-height: 1.6; background: var(--bg3); padding: 10px 12px; border-radius: var(--r); border-left: 2px solid var(--accent2); }

/* Medications */
.med-item { display: flex; align-items: center; gap: 14px; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r2); margin-bottom: 8px; transition: all 0.15s; }
.med-item:hover { border-color: var(--border2); background: var(--surface2); }
.med-dot-ring { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; border: 2px solid; }
.med-name { font-size: 14px; font-weight: 500; color: var(--text); }
.med-detail { font-size: 12px; color: var(--text3); margin-top: 2px; }
.med-doses { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.dose-chip { display: flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 8px; font-size: 12px; border: 1px solid; cursor: pointer; transition: all 0.15s; font-family: var(--mono); }
.dose-chip.taken { background: rgba(0,229,160,0.08); color: var(--success); border-color: rgba(0,229,160,0.25); }
.dose-chip.due { background: rgba(255,179,71,0.08); color: var(--warning); border-color: rgba(255,179,71,0.25); }
.dose-chip:hover { transform: scale(1.04); }

/* Appointments */
.appt-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--r2); padding: 16px 18px; margin-bottom: 10px; display: flex; gap: 16px; align-items: flex-start; transition: all 0.15s; }
.appt-card:hover { border-color: var(--border2); background: var(--surface2); }
.appt-date-box { min-width: 56px; text-align: center; background: rgba(0,153,255,0.1); border-radius: var(--r); padding: 10px 6px; border: 1px solid rgba(0,153,255,0.2); }
.appt-day { font-family: var(--mono); font-size: 26px; font-weight: 500; color: var(--accent2); line-height: 1; }
.appt-month { font-size: 11px; color: var(--text3); font-weight: 500; margin-top: 2px; }
.appt-doctor { font-size: 15px; font-weight: 600; color: var(--text); }
.appt-specialty { font-size: 12px; color: var(--text3); }
.appt-meta { display: flex; gap: 14px; margin-top: 6px; font-size: 12px; color: var(--text3); flex-wrap: wrap; }
.appt-completed { opacity: 0.45; }

/* Cycle */
.cycle-card { background: rgba(255,110,180,0.06); border: 1px solid rgba(255,110,180,0.15); border-radius: var(--r2); padding: 16px; margin-bottom: 16px; }

/* Misc */
.divider { height: 1px; background: var(--border); margin: 16px 0; }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 6px; }
@keyframes spin { to { transform: rotate(360deg); } }
.hidden { display: none !important; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; }

/* Upload zone */
.upload-zone { border: 1px dashed var(--border2); border-radius: var(--r2); padding: 32px; text-align: center; cursor: pointer; transition: all 0.2s; }
.upload-zone:hover { border-color: var(--accent); background: rgba(0,212,200,0.04); }

/* Progress bars */
.prog-bar { background: var(--surface3); border-radius: 4px; height: 5px; overflow: hidden; margin-top: 8px; }
.prog-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }

/* Metrics */
.metric-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; }
.metric-box { background: var(--bg3); border-radius: var(--r); padding: 12px; text-align: center; border: 1px solid var(--border); }
.metric-val { font-family: var(--mono); font-size: 22px; font-weight: 500; margin-bottom: 3px; }
.metric-lbl { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }

/* Loading overlay */
#loadingOverlay { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 9999; flex-direction: column; gap: 16px; }
#loadingOverlay.hidden { display: none; }
.loading-logo { font-family: var(--display); font-size: 28px; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.loading-bar { width: 200px; height: 2px; background: var(--surface2); border-radius: 1px; overflow: hidden; }
.loading-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 1px; animation: loading 1.5s ease infinite; }
@keyframes loading { 0%{width:0%;margin-left:0} 50%{width:60%;margin-left:20%} 100%{width:0%;margin-left:100%} }

/* Responsive */
@media (max-width: 1024px) {
  .grid-4 { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 768px) {
  .sidebar { width: 64px; }
  .sidebar .nav-item span:not(.nav-icon) { display: none; }
  .sidebar-header .logo-title, .sidebar-header .logo-sub { display: none; }
  .sidebar-footer .status-dot span { display: none; }
  .main { margin-left: 64px; padding: 16px; }
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  .form-row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div id="loadingOverlay">
  <div class="loading-logo">HealthMate</div>
  <div class="loading-bar"><div class="loading-bar-fill"></div></div>
  <div style="font-size:13px;color:var(--text3)">Loading your health dashboard…</div>
</div>

<div class="shell">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="logo-row">
        <div class="logo-icon">

async function renderChat() {
  const main = document.getElementById('mainContent');
  main.innerHTML = `
    <div class="page-header">
      <div><div class="page-title">AI Health Chat</div><div class="page-sub">Ask anything about your health, medications, or records</div></div>
      <button class="btn btn-sm" onclick="clearChat()">Clear history</button>
    </div>
    <div class="chat-container">
      <div class="chat-messages" id="chatMsgs"><div style="text-align:center;color:var(--muted);font-size:13px;padding:20px">Loading conversation…</div></div>
      <div class="chat-footer">
        <div class="quick-chips">
          <div class="chip" onclick="quickMsg('How are my vitals looking today?')">Today's vitals</div>
          <div class="chip" onclick="quickMsg('What medications do I need to take today?')">My medications</div>
          <div class="chip" onclick="quickMsg('Give me healthy eating tips for today')">Diet tips</div>
          <div class="chip" onclick="quickMsg('Do I have any upcoming doctor appointments?')">Appointments</div>
          <div class="chip" onclick="quickMsg('I have a headache, what should I do?')">I have a headache</div>
          <div class="chip" onclick="quickMsg('What does my health record say?')">My records</div>
        </div>
        <div class="chat-input-row">
          <input class="chat-input" id="chatInput" placeholder="Type a message…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat();}">
          <button class="send-btn" onclick="sendChat()">➤</button>
        </div>
      </div>
    </div>`;
  loadChatHistory();
}

async function loadChatHistory() {
  const res = await fetch('/api/chat/history');
  const msgs = await res.json();
  const container = document.getElementById('chatMsgs');
  if (!container) return;
  if (msgs.length === 0) {
    container.innerHTML = `<div class="msg ai"><div class="msg-avatar ai">AI</div><div><div class="msg-bubble">Hello! I'm your personal health companion. I can see your vitals, medications, records, and appointments. How are you feeling today? 💙</div></div></div>`;
  } else {
    container.innerHTML = msgs.map(m => msgHTML(m.role === 'assistant' ? 'ai' : 'user', m.content, m.timestamp)).join('');
  }
  container.scrollTop = container.scrollHeight;
}

function msgHTML(role, content, time) {
  const t = time ? new Date(time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '';
  return `<div class="msg ${role}">
    <div class="msg-avatar ${role}">${role === 'ai' ? 'AI' : 'You'}</div>
    <div><div class="msg-bubble">${content.replace(/\n/g,'<br>')}</div>${t?`<div class="msg-time">${t}</div>`:''}</div>
  </div>`;
}

function quickMsg(text) {
  document.getElementById('chatInput').value = text;
  sendChat();
}

async function sendChat() {
  const input = document.getElementById('chatInput');
  const text = input?.value.trim();
  if (!text) return;
  input.value = '';
  const container = document.getElementById('chatMsgs');
  container.innerHTML += msgHTML('user', text, new Date().toISOString());
  const typing = document.createElement('div');
  typing.id = 'typing'; typing.className = 'msg ai';
  typing.innerHTML = `<div class="msg-avatar ai">AI</div><div class="msg-bubble"><span class="spinner"></span>Thinking…</div>`;
  container.appendChild(typing);
  container.scrollTop = container.scrollHeight;

  const res = await fetch('/api/chat', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:text})});
  const data = await res.json();
  document.getElementById('typing')?.remove();
  container.innerHTML += msgHTML('ai', data.reply || 'Sorry, something went wrong.', new Date().toISOString());
  container.scrollTop = container.scrollHeight;
}

async function clearChat() {
  if (!confirm('Clear all chat history?')) return;
  await fetch('/api/chat/clear', {method:'POST'});
  loadChatHistory();
}

async function renderVitals() {

      <div class="card">

        <div class="chart-wrap" style="height:200px"><canvas id="vitalsChart"></canvas></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">Recent Readings</div>
      <div id="vitalsList"></div>
    </div>`;
  loadVitals();

async function loadVitals() {
  const res = await fetch('/api/vitals');
  const data = await res.json();

  // Latest stats
  const last = data[0];
  const topEl = document.getElementById('vitalsTop');
  if (last) {
    const o2s = last.oxygen >= 95 ? 'ok' : last.oxygen >= 90 ? 'warn' : 'err';
    const hrs = (last.heart_rate >= 60 && last.heart_rate <= 100) ? 'ok' : 'warn';
    const ts = last.temperature <= 99 ? 'ok' : last.temperature <= 100.4 ? 'warn' : 'err';
    const bpLabel = last.bp_sys && last.bp_dia ? `${last.bp_sys}/${last.bp_dia}` : '—';
    const lastTime = last.timestamp ? `Updated ${last.timestamp.slice(11,16)}` : '';
    topEl.innerHTML = `<div class="grid-4" style="margin-bottom:20px">
      <div class="stat-card c-teal">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div class="stat-label">O₂ Saturation</div>
          <div style="font-size:18px">🫁</div>
        </div>
        <div class="stat-value" style="color:var(--accent);font-size:42px">${last.oxygen || '—'}</div>
        <div class="stat-unit">percent</div>
        <span class="stat-badge badge-${o2s}">${o2s==='ok'?'✓ Normal':o2s==='warn'?'⚠ Low':'⛔ Critical'}</span>
        <div style="font-size:10px;color:var(--text3);margin-top:6px">${lastTime}</div>
      </div>
      <div class="stat-card c-red">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div class="stat-label">Heart Rate</div>
          <div class="heartbeat-anim" style="font-size:18px">❤️</div>
        </div>
        <div class="stat-value" style="color:var(--danger);font-size:42px">${last.heart_rate || '—'}</div>
        <div class="stat-unit">bpm</div>
        <span class="stat-badge badge-${hrs}">${hrs==='ok'?'✓ Normal':'⚠ Check'}</span>
        <div style="font-size:10px;color:var(--text3);margin-top:6px">${lastTime}</div>
      </div>
      <div class="stat-card c-blue">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div class="stat-label">Blood Pressure</div>
          <div style="font-size:18px">🩸</div>
        </div>
        <div class="stat-value" style="color:var(--accent2);font-size:${bpLabel.length > 5 ? '24px' : '36px'}">${bpLabel}</div>
        <div class="stat-unit">mmHg (sys/dia)</div>
        <span class="stat-badge badge-ok">${last.bp_sys ? '✓ Normal' : '— No data'}</span>
        <div style="font-size:10px;color:var(--text3);margin-top:6px">${lastTime}</div>
      </div>
      <div class="stat-card c-yellow">
        <div style="display:flex;justify-content:space-between;align-items:flex-start">
          <div class="stat-label">Temperature</div>
          <div style="font-size:18px">🌡️</div>
        </div>
        <div class="stat-value" style="color:var(--warning);font-size:42px">${last.temperature || '—'}</div>
        <div class="stat-unit">°F</div>
        <span class="stat-badge badge-${ts}">${ts==='ok'?'✓ Normal':ts==='warn'?'⚠ Mild fever':'⛔ High fever'}</span>
        <div style="font-size:10px;color:var(--text3);margin-top:6px">${lastTime}</div>
      </div>
    </div>`;
  } else {
    topEl.innerHTML = `<div class="alert alert-info" style="margin-bottom:20px">No vitals recorded yet. Log your first reading below or sync from your watch.</div>`;
  }

  // Chart
  const chartData = data.slice(0, 10).reverse();
  const ctx = document.getElementById('vitalsChart');
  if (ctx && chartData.length) {
    if (vitalsChart) { vitalsChart.destroy(); vitalsChart = null; }
    vitalsChart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: chartData.map(v => v.timestamp.slice(11,16)),
        datasets: [
          { label: 'O2 %', data: chartData.map(v => v.oxygen), borderColor: '#00d4c8', backgroundColor: 'rgba(0,212,200,0.08)', tension: 0.4, pointRadius: 4 },
          { label: 'Heart Rate', data: chartData.map(v => v.heart_rate), borderColor: '#ff4d6d', backgroundColor: 'rgba(255,77,109,0.08)', tension: 0.4, pointRadius: 4 }
        ]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { labels: { color: '#8a9ab8', font: { size: 11 } } } }, scales: { y: { min: 50, max: 120, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#4a5a78', font: { size: 10 } } }, x: { grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: '#4a5a78', font: { size: 10 }, autoSkip: false, maxRotation: 0 } } } }
    });
  }

  // Table
  const listEl = document.getElementById('vitalsList');
  if (!data.length) { listEl.innerHTML = '<p style="color:var(--muted);font-size:13px">No readings yet. Log your first reading above.</p>'; return; }
  listEl.innerHTML = `<table style="width:100%;font-size:13px;border-collapse:collapse">
    <thead><tr style="color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:0.05em">${['Time','O2 %','HR (bpm)','BP','Temp °F','Notes'].map(h=>`<th style="padding:6px 10px;text-align:left;font-weight:500">${h}</th>`).join('')}</tr></thead>
    <tbody>${data.map(v=>`<tr style="border-top:1px solid var(--border)">
      <td style="padding:8px 10px;color:var(--muted)">${v.timestamp}</td>
      <td style="padding:8px 10px;font-weight:500;color:${v.oxygen<95?'var(--danger)':'var(--success)'}">${v.oxygen||'—'}</td>
      <td style="padding:8px 10px">${v.heart_rate||'—'}</td>
      <td style="padding:8px 10px">${v.bp_sys&&v.bp_dia?v.bp_sys+'/'+v.bp_dia:'—'}</td>
      <td style="padding:8px 10px;color:${v.temperature>99.5?'var(--warning)':'inherit'}">${v.temperature||'—'}</td>
      <td style="padding:8px 10px;color:var(--muted)">${v.notes||''}</td>
    </tr>`).join('')}</tbody></table>`;
}

async function logVital() {
  const o2 = document.getElementById('v-o2').value;
  const hr = document.getElementById('v-hr').value;
  const bps = document.getElementById('v-bps').value;
  const bpd = document.getElementById('v-bpd').value;
  const temp = document.getElementById('v-temp').value;
  const notes = document.getElementById('v-notes').value;
  await fetch('/api/vitals', {method:'POST',headers:{'Content-Type':'application/json'},
    body: JSON.stringify({oxygen:o2||null, heart_rate:hr||null, bp_sys:bps||null, bp_dia:bpd||null, temperature:temp||null, notes})});
  loadVitals();
}

async function renderMedications() {
  document.getElementById('mainContent').innerHTML = `
    <div class="page-header">
      <div><div class="page-title">Medications</div><div class="page-sub">Track doses and mark as taken for today</div></div>

      <div id="timesContainer"><div class="form-group"><label>Time 1</label><input type="time" class="med-time-input" value="09:00"></div></div>

async function loadMedications() {
  const res = await fetch('/api/medications');
  const meds = await res.json();
  const due = meds.filter(m => m.taken.includes(false));
  const badge = document.getElementById('medBadge');
  if (due.length > 0) { badge.textContent = due.length; badge.classList.remove('hidden'); }
  else badge.classList.add('hidden');

  const alertEl = document.getElementById('medAlert');
  alertEl.innerHTML = due.length
    ? `<div class="alert alert-warn">⚠️ ${due.length} medication${due.length>1?'s':''} pending today: ${due.map(m=>m.name).join(', ')}</div>`
    : `<div class="alert alert-success">✅ All medications taken for today!</div>`;

  const listEl = document.getElementById('medList');
  if (!meds.length) { listEl.innerHTML = '<p style="color:var(--muted);font-size:13px">No medications added yet.</p>'; return; }
  listEl.innerHTML = meds.map(m => `
    <div class="med-item">
      <div class="med-dot" style="background:${m.color}"></div>
      <div class="med-info">
        <div class="med-name">${m.name} <span style="font-size:12px;font-weight:400;color:var(--muted)">${m.dose}</span></div>
        <div class="med-detail">${m.frequency}</div>
        <div class="med-doses" style="margin-top:6px">
          ${m.times.map((t,i) => `<div class="dose-chip ${m.taken[i]?'taken':'due'}" onclick="toggleDose(${m.id},${i},${!m.taken[i]})">
            ${m.taken[i]?'✓':''} ${t}
          </div>`).join('')}
        </div>
      </div>
      <button class="btn-icon" onclick="deleteMed(${m.id})" title="Remove">🗑</button>
    </div>`).join('');
}

function addTimeField() {
  const c = document.getElementById('timesContainer');
  const n = c.children.length + 1;
  const div = document.createElement('div'); div.className = 'form-group';
  div.innerHTML = `<label>Time ${n}</label><input type="time" class="med-time-input" value="20:00">`;
  c.appendChild(div);
}

async function addMedication() {
  const name = document.getElementById('m-name').value.trim();
  if (!name) return alert('Please enter a medication name');
  const times = [...document.querySelectorAll('.med-time-input')].map(i => i.value);
  await fetch('/api/medications', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    name, dose: document.getElementById('m-dose').value,
    frequency: document.getElementById('m-freq').value,
    times, color: document.getElementById('m-color').value
  })});
  renderMedications();
}

async function toggleDose(medId, doseIdx, taken) {
  await fetch('/api/medications/log', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({med_id:medId,dose_index:doseIdx,taken})});
  loadMedications();
}

async function deleteMed(id) {
  if (!confirm('Remove this medication?')) return;
  await fetch(`/api/medications/${id}`, {method:'DELETE'});
  renderMedications();
}

async function uploadRecord(input) {
  const file = input.files[0]; if (!file) return;
  document.getElementById('uploadProgress').classList.remove('hidden');
  const form = new FormData(); form.append('file', file);
  await fetch('/api/records/upload', {method:'POST', body: form});
  document.getElementById('uploadProgress').classList.add('hidden');
  loadRecords();
}

async function deleteRecord(id) {
  if (!confirm('Delete this record?')) return;
  await fetch(`/api/records/${id}`, {method:'DELETE'});
  loadRecords();
}

async function loadCycle() {
  const res = await fetch('/api/cycle');
  const cycles = await res.json();
  const el = document.getElementById('cycleHistory');
  if (!cycles.length) { el.innerHTML = '<p style="color:var(--muted);font-size:13px">No cycle data yet. Log your first period above.</p>'; return; }

  const avg = cycles.length > 1
    ? Math.round(cycles.slice(0,-1).reduce((s,c) => s + (c.cycle_length||28), 0) / (cycles.length-1))
    : 28;
  const last = cycles[0];
  const lastStart = new Date(last.start_date);
  const nextPredicted = new Date(lastStart);
  nextPredicted.setDate(nextPredicted.getDate() + avg);
  const daysUntil = Math.round((nextPredicted - new Date()) / 86400000);

  el.innerHTML = `
    <div style="background:var(--pink-bg);border:1px solid #fbcfe8;border-radius:8px;padding:12px;margin-bottom:14px">
      <div style="font-size:13px;color:var(--pink);font-weight:500">Next period prediction</div>
      <div style="font-size:22px;font-weight:700;color:var(--pink);margin:4px 0">${nextPredicted.toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</div>
      <div style="font-size:12px;color:var(--muted)">${daysUntil > 0 ? `in ${daysUntil} days` : daysUntil === 0 ? 'today' : `${Math.abs(daysUntil)} days ago`} · avg cycle: ${avg} days</div>
    </div>
    ${cycles.map(c => {
      const symptoms = c.symptoms ? JSON.parse(c.symptoms) : [];
      const flowColors = {light:'#f9a8d4',medium:'#ec4899',heavy:'#9d174d',spotting:'#fda4af'};
      return `<div style="padding:10px 0;border-bottom:1px solid var(--border)">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div style="font-size:14px;font-weight:500">🩸 ${new Date(c.start_date).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</div>
          <span class="tag" style="background:${flowColors[c.flow_intensity]||'#f9a8d4'}22;color:${flowColors[c.flow_intensity]||'#db2777'}">${c.flow_intensity}</span>
        </div>
        ${c.end_date?`<div style="font-size:12px;color:var(--muted);margin-top:2px">to ${new Date(c.end_date).toLocaleDateString('en-IN',{day:'numeric',month:'short'})}</div>`:''}
        ${symptoms.length?`<div style="font-size:12px;color:var(--muted);margin-top:4px">${symptoms.join(', ')}</div>`:''}
        ${c.notes?`<div style="font-size:12px;color:var(--muted);margin-top:2px">${c.notes}</div>`:''}
      </div>`;
    }).join('')}`;
}

async function addCycle() {
  const symptoms = [...document.querySelectorAll('#symptomPicker input:checked')].map(i => i.value);
  const start = document.getElementById('c-start').value;
  const end = document.getElementById('c-end').value;
  let cycleLen = null;
  const res = await fetch('/api/cycle');
  const prev = await res.json();
  if (prev.length && prev[0].start_date && start) {
    cycleLen = Math.round((new Date(start) - new Date(prev[0].start_date)) / 86400000);
  }
  await fetch('/api/cycle', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
    start_date: start, end_date: end,
    cycle_length: cycleLen,
    flow_intensity: document.getElementById('c-flow').value,
    symptoms, notes: document.getElementById('c-notes').value
  })});
  loadCycle();
}

      method: 'POST', headers: {'Content-Type':'application/json'},

    const d = await res.json();
    if (d.calories) {
      document.getElementById('d-cal').value = d.calories;
      // Store nutrients in notes as JSON
      document.getElementById('d-notes').value = JSON.stringify({

      resultEl.innerHTML = `

        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:8px">
          ${[['Protein',d.protein_g,'g','#2563eb'],['Carbs',d.carbs_g,'g','#d97706'],['Fat',d.fat_g,'g','#dc2626'],['Fiber',d.fiber_g,'g','#16a34a']].map(([n,v,u,c])=>
            `<div style="background:var(--color-background-primary);border-radius:var(--border-radius-md);padding:6px 8px;text-align:center"><div style="font-size:16px;font-weight:500;color:${c}">${v||0}${u}</div><div style="font-size:10px;color:var(--color-text-secondary)">${n}</div></div>`
          ).join('')}
        </div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:8px;font-size:12px">
          <span style="color:var(--color-text-secondary)">Sodium: <strong>${d.sodium_mg||0}mg</strong></span>

async function analyzePhoto(input) {
  const file = input.files[0]; if (!file) return;
  const resultEl = document.getElementById('aiCalResult');
  resultEl.style.display = 'block';
  resultEl.style.cssText = 'display:block;background:rgba(0,153,255,0.08);border:1px solid rgba(0,153,255,0.2);border-radius:10px;padding:12px 14px;font-size:13px;margin-bottom:10px;line-height:1.7;color:#8a9ab8';
  resultEl.innerHTML = '<span class="spinner"></span>Analyzing your food photo with AI… (may take 15-30s)';

  // Resize image before upload to reduce timeout risk
  const resized = await resizeImage(file, 800);
  const form = new FormData(); form.append('photo', resized, 'photo.jpg');

  try {
    const res = await fetch('/api/analyze-food-photo', {method:'POST', body: form});
    // Guard against HTML error pages (timeout / gateway errors)
    const contentType = res.headers.get('content-type') || '';
    if (!contentType.includes('application/json')) {
      resultEl.innerHTML = '<span style="color:var(--danger)">❌ Server timed out analyzing the photo. Try a smaller/clearer image or enter food details manually.</span>';
      input.value = ''; return;
    }
    const d = await res.json();
    if (d.calories) {
      document.getElementById('d-food').value = d.food_items || '';
      document.getElementById('d-cal').value = d.calories;
      if (d.meal_type) document.getElementById('d-meal').value = d.meal_type;
      document.getElementById('d-notes').value = JSON.stringify({protein_g:d.protein_g,carbs_g:d.carbs_g,fat_g:d.fat_g,fiber_g:d.fiber_g});
      resultEl.style.cssText = 'display:block;background:rgba(0,229,160,0.06);border:1px solid rgba(0,229,160,0.2);border-radius:10px;padding:12px 14px;font-size:13px;margin-bottom:10px;line-height:1.7';
      resultEl.innerHTML = `<div style="font-weight:500;color:var(--success);margin-bottom:8px">📸 Photo analyzed — ${d.calories} kcal</div>
        <div style="color:var(--text2)">${d.food_items}</div>
        <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px">
          ${[['Protein',d.protein_g+'g','#2563eb'],['Carbs',d.carbs_g+'g','#d97706'],['Fat',d.fat_g+'g','#dc2626'],['Fiber',d.fiber_g+'g','#16a34a']].map(([n,v,c])=>
            `<div style="background:var(--surface);border-radius:6px;padding:6px;text-align:center"><div style="font-size:14px;font-weight:500;color:${c}">${v}</div><div style="font-size:10px;color:var(--text3)">${n}</div></div>`).join('')}
        </div>
        ${d.health_note ? `<div style="font-size:12px;color:var(--text3);margin-top:6px">💡 ${d.health_note}</div>` : ''}`;
    } else {
      resultEl.innerHTML = `<span style="color:var(--danger)">❌ ${d.error || 'Could not analyze photo. Please enter food details manually.'}</span>`;
    }
  } catch(e) {
    resultEl.innerHTML = `<span style="color:var(--danger)">❌ Photo analysis failed. Please enter food details manually.</span>`;
  }
  input.value = '';
}

// Resize image on the client before uploading — reduces server processing time significantly
function resizeImage(file, maxPx) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const scale = Math.min(1, maxPx / Math.max(img.width, img.height));
      const canvas = document.createElement('canvas');
      canvas.width = Math.round(img.width * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      URL.revokeObjectURL(url);
      canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.82);
    };
    img.onerror = () => { URL.revokeObjectURL(url); resolve(file); };
    img.src = url;
  });
}

  if (statusEl) statusEl.innerHTML = '<div class="alert alert-info"><span class="spinner"></span>Fetching latest data from your Fastrack watch via Google Fit…</div>';
  try {
    const res = await fetch('/api/googlefit/sync', {method:'POST'});
    const d = await res.json();
    if (d.success) {
      const v = d.data;
      const parts = [];
      if (v.heart_rate) parts.push('Heart Rate: ' + v.heart_rate + ' bpm');
      if (v.oxygen) parts.push('O2: ' + v.oxygen + '%');
      if (v.steps) parts.push('Steps: ' + v.steps.toLocaleString());
      if (v.bp_sys) parts.push('BP: ' + v.bp_sys + '/' + v.bp_dia);
      if (statusEl) statusEl.innerHTML = '<div class="alert alert-success">✅ Synced! ' + parts.join(' · ') + ' — saved to vitals.</div>';
      setTimeout(() => loadVitals(), 500);
    } else {
      if (statusEl) statusEl.innerHTML = '<div class="alert" style="background:var(--danger-bg);color:var(--danger);border:1px solid #fca5a5">❌ ' + (d.error||'Sync failed') + '</div>';
    }
  } catch(e) {
    if (statusEl) statusEl.innerHTML = '<div class="alert" style="background:var(--danger-bg);color:var(--danger)">❌ Error: ' + e.message + '</div>';
  }
  if (btn) { btn.textContent = '📱 Sync from Watch'; btn.disabled = false; }
}

// ─── AI Dietician Analysis ────────────────────────────────────────────────────
function renderMarkdown(text) {
  return text
    .replace(/^### (.+)$/gm, '<div style="font-size:14px;font-weight:500;color:var(--color-text-primary);margin:12px 0 4px">$1</div>')
    .replace(/^## (.+)$/gm, '<div style="font-size:15px;font-weight:500;color:var(--color-text-primary);margin:14px 0 6px">$1</div>')
    .replace(/^# (.+)$/gm, '<div style="font-size:16px;font-weight:500;margin:14px 0 6px">$1</div>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^- (.+)$/gm, '<div style="padding:2px 0 2px 14px;border-left:2px solid var(--color-border-secondary);margin:3px 0;font-size:13px">$1</div>')
    .replace(/^\| (.+) \|$/gm, '<div style="font-size:12px;color:var(--color-text-secondary);padding:2px 0">$1</div>')
    .replace(/^---+$/gm, '<hr style="border:none;border-top:0.5px solid var(--color-border-tertiary);margin:12px 0">')
    .replace(/\n\n/g, '<br>')
    .replace(/\n/g, '<br>');
}

function getBmiHtml(p) {
  if (!p.weight_kg || !p.height_cm) return '<p style="color:var(--color-text-secondary);font-size:13px">Enter weight and height to see your BMI.</p>';
  const bmi = (p.weight_kg / Math.pow(p.height_cm/100, 2)).toFixed(1);
  const cat = bmi < 18.5 ? ['Underweight','var(--color-text-info)'] : bmi < 25 ? ['Normal weight','var(--color-text-success)'] : bmi < 30 ? ['Overweight','var(--color-text-warning)'] : ['Obese','var(--color-text-danger)'];
  const ilow = (18.5 * Math.pow(p.height_cm/100,2)).toFixed(1);
  const ihigh = (24.9 * Math.pow(p.height_cm/100,2)).toFixed(1);
  const pct = Math.min(100, Math.max(0, ((bmi-10)/30)*100)).toFixed(0);
  return '<div style="text-align:center;padding:16px 0 8px">'
    + '<div style="font-size:52px;font-weight:500;color:' + cat[1] + '">' + bmi + '</div>'
    + '<div style="font-size:15px;color:' + cat[1] + ';font-weight:500;margin-bottom:4px">' + cat[0] + '</div>'
    + '<div style="font-size:12px;color:var(--color-text-secondary)">Ideal weight: ' + ilow + ' – ' + ihigh + ' kg</div>'
    + '<div style="background:var(--color-background-secondary);border-radius:4px;height:8px;margin:12px 0 4px">'
    + '<div style="background:' + cat[1] + ';height:8px;border-radius:4px;width:' + pct + '%"></div></div>'
    + '<div style="display:flex;justify-content:space-between;font-size:11px;color:var(--color-text-secondary)">'
    + '<span>Underweight &lt;18.5</span><span>Normal 18.5–25</span><span>Obese &gt;30</span></div>'
    + '</div>';
}

// ─── TOAST NOTIFICATION ──────────────────────────────────────────
// ══════════════════════════════════════════════════════════════════
function showToast(msg, type='ok', duration=3000) {
  const colors = { ok:'#00e5a0', warn:'#ffb347', error:'#ff4d6d', info:'#0099ff' };
  const icons  = { ok:'✓', warn:'⚠️', error:'✕', info:'ℹ' };
  const t = document.createElement('div');
  t.style.cssText = `position:fixed;bottom:28px;right:28px;z-index:9999;background:var(--surface2);border:1px solid ${colors[type]}44;border-left:3px solid ${colors[type]};border-radius:10px;padding:12px 18px;font-size:13px;color:var(--text);display:flex;align-items:center;gap:10px;box-shadow:0 8px 32px rgba(0,0,0,0.4);animation:slideIn 0.25s ease;max-width:340px`;
  t.innerHTML = `<span style="color:${colors[type]};font-size:16px">${icons[type]}</span><span>${msg}</span>`;
  document.body.appendChild(t);
  setTimeout(() => { t.style.opacity='0'; t.style.transition='opacity 0.3s'; setTimeout(()=>t.remove(),300); }, duration);
}

<script>

          newSW.addEventListener('statechange', () => {
            if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
              showPwaToast('App updated! Refresh for the latest version.', 'update');
            }
          });
        });
      })
      .catch(err => console.warn('[SW] Registration failed:', err));
  });
}

// Install prompt (Android Chrome "Add to Home Screen")
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  // Show install banner after 3 seconds if not already installed
  setTimeout(() => {
    if (deferredPrompt && !window.matchMedia('(display-mode: standalone)').matches) {
      showInstallBanner();
    }
  }, 3000);
});

window.addEventListener('appinstalled', () => {
  deferredPrompt = null;
  const banner = document.getElementById('pwaInstallBanner');
  if (banner) banner.remove();
  showPwaToast('HealthMate installed! 🎉', 'ok');
});

function showInstallBanner() {
  if (document.getElementById('pwaInstallBanner')) return;
  const banner = document.createElement('div');
  banner.id = 'pwaInstallBanner';
  banner.innerHTML = `
    <div style="display:flex;align-items:center;gap:12px;flex:1">
      <img src="/static/icons/icon-72x72.png" style="width:40px;height:40px;border-radius:10px;flex-shrink:0">
      <div>
        <div style="font-size:13px;font-weight:600;color:#e8edf5">Add HealthMate to Home Screen</div>
        <div style="font-size:11px;color:#8a9ab8;margin-top:1px">Works offline · No app store needed</div>
      </div>
    </div>
    <div style="display:flex;gap:8px;flex-shrink:0">
      <button onclick="installPwa()" style="padding:8px 16px;background:linear-gradient(135deg,#00d4c8,#00b8ad);color:#001a1a;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit">Install</button>
      <button onclick="document.getElementById('pwaInstallBanner').remove()" style="padding:8px 10px;background:transparent;border:1px solid rgba(255,255,255,0.1);color:#8a9ab8;border-radius:8px;font-size:13px;cursor:pointer">✕</button>
    </div>`;
  banner.style.cssText = `
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
    background:#141f35;border:1px solid rgba(0,212,200,0.2);border-radius:16px;
    padding:14px 16px;display:flex;align-items:center;gap:12px;
    box-shadow:0 8px 32px rgba(0,0,0,0.5);z-index:99999;
    width:calc(100% - 32px);max-width:420px;
    animation:slideUp 0.3s ease;
  `;
  // Add animation keyframe if not present
  if (!document.getElementById('pwaStyle')) {
    const st = document.createElement('style');
    st.id = 'pwaStyle';
    st.textContent = '@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}';
    document.head.appendChild(st);
  }
  document.body.appendChild(banner);
}

async function installPwa() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  const banner = document.getElementById('pwaInstallBanner');
  if (banner) banner.remove();
}

function showPwaToast(msg, type) {
  if (typeof showToast === 'function') {
    showToast(msg, type);
  }
}

// iOS: show "Add to Home Screen" instructions (Safari doesn't support beforeinstallprompt)
const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isInStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
if (isIos && !isInStandalone) {
  setTimeout(() => {
    if (document.getElementById('pwaInstallBanner') || document.getElementById('iosInstallTip')) return;
    const tip = document.createElement('div');
    tip.id = 'iosInstallTip';
    tip.innerHTML = `
      <div style="display:flex;align-items:flex-start;gap:12px">
        <img src="/static/icons/icon-72x72.png" style="width:40px;height:40px;border-radius:10px;flex-shrink:0;margin-top:2px">
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600;color:#e8edf5;margin-bottom:4px">Install HealthMate on your iPhone</div>
          <div style="font-size:12px;color:#8a9ab8;line-height:1.6">
            Tap <strong style="color:#00d4c8">Share</strong> <span style="font-size:14px">⬆️</span> then
            <strong style="color:#00d4c8">"Add to Home Screen"</strong> <span style="font-size:14px">➕</span>
          </div>
        </div>
        <button onclick="document.getElementById('iosInstallTip').remove()" style="background:transparent;border:none;color:#8a9ab8;font-size:18px;cursor:pointer;padding:0;line-height:1;flex-shrink:0">✕</button>
      </div>
      <div style="margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.06);display:flex;justify-content:center">
        <div style="font-size:11px;color:#4a5a78">Works offline · Looks & feels like a native app</div>
      </div>`;
    tip.style.cssText = `
      position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
      background:#141f35;border:1px solid rgba(0,212,200,0.2);border-radius:16px;
      padding:16px;box-shadow:0 8px 32px rgba(0,0,0,0.5);z-index:99999;
      width:calc(100% - 32px);max-width:420px;
    `;
    document.body.appendChild(tip);
  }, 4000);
}
</script>
